services:
  db: 
    image: postgres:16-alpine
    container_name: crm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mini_crm
      POSTGRES_USER: crm_user 
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crm_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d mini_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: . 
      dockerfile: ./apps/api/Dockerfile
    container_name: crm-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://crm_user:${DB_PASSWORD:-crm_password}@db:5432/mini_crm
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-mini_crm_jwt_secret_key}
      FRONTEND_URL: http://localhost:8080
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: crm-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
